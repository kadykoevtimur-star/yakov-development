<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Circle frame -->
  <circle cx="200" cy="155" r="135" stroke="currentColor" stroke-width="3" fill="none"/>

  <!-- YD monogram -->
  <text x="200" y="195" text-anchor="middle"
        font-family="'Playfair Display', 'Inter', serif"
        font-size="120" font-weight="500"
        letter-spacing="-2"
        fill="currentColor"
        stroke="none">YD</text>

  <!-- Decorative lines around company name -->
  <line x1="40"  y1="320" x2="100" y2="320" stroke="currentColor" stroke-width="1.5"/>
  <line x1="300" y1="320" x2="360" y2="320" stroke="currentColor" stroke-width="1.5"/>

  <!-- Company name -->
  <text x="200" y="328" text-anchor="middle"
        font-family="'Inter','Montserrat',sans-serif"
        font-size="28" font-weight="400"
        letter-spacing="3"
        fill="currentColor"
        stroke="none">YAKOV DEVELOPMENT</text>

  <!-- Underline -->
  <line x1="60" y1="345" x2="340" y2="345" stroke="currentColor" stroke-width="1"/>

  <!-- Tagline -->
  <text x="200" y="368" text-anchor="middle"
        font-family="'Inter','Montserrat',sans-serif"
        font-size="13" font-weight="400"
        letter-spacing="3"
        fill="currentColor"
        stroke="none">INTERIOR AND CONSTRUCTION COMPANY</text>
</svg>
